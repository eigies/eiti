name: Deploy LAN IIS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, windows, iis]
    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -command ". '{0}'"

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Trust local repositories
        run: |
          git config --global --add safe.directory C:/eiti
          git config --global --add safe.directory C:/eiti-front

      - name: Update local backend
        id: backend
        run: |
          $prevSha = git -C C:\eiti rev-parse HEAD
          "prev_sha=$prevSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          git -C C:\eiti fetch origin
          git -C C:\eiti reset --hard origin/main

      - name: Update frontend
        run: |
          git -C C:\eiti-front fetch origin
          git -C C:\eiti-front reset --hard origin/main

      - name: Deploy
        run: |
          & "$env:GITHUB_WORKSPACE\.agents\skills\deploy-lan-iis\scripts\deploy.ps1" `
            -ConnectionString "${{ secrets.DEPLOY_CONNECTION_STRING }}" `
            -SkipPrecheck

      - name: Start ngrok tunnel
        id: ngrok
        run: |
          $publicUrl = & "$env:GITHUB_WORKSPACE\.agents\skills\deploy-lan-iis\scripts\start-ngrok-tunnel.ps1" `
            -LocalUrl 'http://127.0.0.1:80' `
            -ToolRoot 'C:\eiti\tools\ngrok' `
            -NgrokExe 'C:\Users\eitip\AppData\Local\Microsoft\WinGet\Packages\Ngrok.Ngrok_Microsoft.Winget.Source_8wekyb3d8bbwe\ngrok.exe' `
            -Authtoken "${{ secrets.NGROK_AUTHTOKEN }}"
          "public_url=$publicUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "## Public URL`n`n$publicUrl" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Notify Telegram
        run: |
          $prevSha = "${{ steps.backend.outputs.prev_sha }}"
          $sendScript = "$env:GITHUB_WORKSPACE\.agents\skills\deploy-lan-iis\scripts\send-telegram.ps1"
          $changelogScript = "$env:GITHUB_WORKSPACE\.agents\skills\deploy-lan-iis\scripts\build-changelog.ps1"
          $publicUrl = "${{ steps.ngrok.outputs.public_url }}"
          $ownerChatId = "${{ secrets.TELEGRAM_OWNER_CHAT_ID }}"

          $clientChangelog = & $changelogScript -RepoPath 'C:\eiti' -FromSha $prevSha
          $clientMessage = @(
            'Eiti actualizado correctamente.',
            '',
            $clientChangelog,
            '',
            "URL: $publicUrl"
          ) -join "`n"
          & $sendScript `
            -BotToken "${{ secrets.TELEGRAM_BOT_TOKEN }}" `
            -ChatId "${{ secrets.TELEGRAM_CHAT_ID }}" `
            -Message $clientMessage

          if (-not [string]::IsNullOrWhiteSpace($ownerChatId)) {
            $ownerChangelog = & $changelogScript -RepoPath 'C:\eiti' -FromSha $prevSha -Detailed
            $ownerMessage = @(
              '[Deploy OK] eiti/main',
              '',
              $ownerChangelog,
              '',
              "URL: $publicUrl",
              "Commit: ${{ github.sha }}",
              "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            ) -join "`n"
            & $sendScript `
              -BotToken "${{ secrets.TELEGRAM_BOT_TOKEN }}" `
              -ChatId $ownerChatId `
              -Message $ownerMessage
          } else {
            Write-Host '[WARN] TELEGRAM_OWNER_CHAT_ID is empty. Skipping owner notification.'
          }
